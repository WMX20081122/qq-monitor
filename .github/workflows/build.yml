name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            suffix: .exe
          - os: macos-latest
            suffix: ''
          - os: ubuntu-latest
            suffix: ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name QQMonitor --hidden-import=PyQt5 --hidden-import=requests --hidden-import=yaml qq_monitor.py
      
      - name: Build with PyInstaller (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --name QQMonitor --hidden-import=PyQt5 --hidden-import=requests --hidden-import=yaml qq_monitor.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQMonitor-${{ matrix.os }}
          path: dist/QQMonitor${{ matrix.suffix }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      
      - name: Display structure of downloaded files
        run: ls -R dist
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/QQMonitor-windows-latest/QQMonitor.exe
            dist/QQMonitor-macos-latest/QQMonitor
            dist/QQMonitor-ubuntu-latest/QQMonitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
